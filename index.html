function App(){
  const[handle,setHandle]=useState("");const[pass,setPass]=useState("");const[vault,setVault]=useState(false);const[showP,setShowP]=useState(false);const[keepAudio,setKeepAudio]=useState(false);
  const[step,setStep]=useState(0);const[rec,setRec]=useState(false);const[hasRec,setHasRec]=useState(false);const[recDur,setRecDur]=useState(0);const[amp,setAmp]=useState(0);const[el,setEl]=useState(0);
  const[method,setMethod]=useState("");const[customM,setCustomM]=useState("");const[dose,setDose]=useState("");const[setting,setSetting]=useState("");const[intention,setIntention]=useState("");const[ppiaType,setPpiaType]=useState("");const[expFreq,setExpFreq]=useState("");

  const enc=await encryptPayload(payload,pass);const jb=new Blob([enc],{type:"application/octet-stream"});const a=document.createElement("a");a.href=URL.createObjectURL(jb);a.download=(handle||"anon")+"-"+Date.now()+".sensoria.enc";a.click();URL.revokeObjectURL(a.href);

          {pass&&<><div className="strength-bar"><div className="strength-fill" style={{width:st.w+"%",background:st.c}}/></div><div className="field-hint" style={{color:st.c,marginTop:6}}>{st.l}</div></>}

        </div>
      </div>
      <div style={{textAlign:"center",marginTop:8,marginBottom:24}}><button className="btn-danger-ghost" onClick={burn}>Burn this vault</button><div className="field-hint" style={{marginTop:8,textAlign:"center"}}>Wipe everything. Start over with a clean identity.</div></div>
      <div className="footer-note">Sensoria Research<br/>Encrypted &middot; Pseudonymous &middot; Sovereign<br/><br/><em style={{color:"var(--text-secondary)"}}>Sovereign psychonauts building the map of human consciousness through experience.</em></div>
    </div>}

    {vault&&<div className="nav-footer">{step>0&&<button className="btn-secondary" onClick={()=>setStep(s=>s-1)}>Back</button>}{step<5&&<button className="btn-primary nav-continue" onClick={()=>setStep(s=>s+1)}>{step===0&&!hasRec?"Skip voice for now \u2192":"Continue \u2192"}</button>}</div>}
  </div>)}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
